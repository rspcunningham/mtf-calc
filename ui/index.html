<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTF Calculator</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
    }
    .container { text-align: center; }
    input {
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
    }
    button {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      background: #0f3460;
      color: #eee;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1a4a7a; }
    #result { margin-top: 1rem; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MTF Calculator</h1>
    <div>
      <input id="name" type="text" placeholder="Your name" />
      <button onclick="sayHello()">Greet</button>
    </div>
    <div id="result"></div>
  </div>
  <script>
    async function sayHello() {
      const name = document.getElementById('name').value || 'World';
      const response = await pywebview.api.greet(name);
      document.getElementById('result').textContent = response;
    }
  </script>
</body>
</html>
